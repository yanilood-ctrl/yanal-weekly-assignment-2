<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Weekly Assignment</title>

    <style>
        body {
            background: linear-gradient(to right, #0ea5e9, #8b5cf6);
            color: white;
            font-family: Arial;
            text-align: center;
            padding-top: 100px;
        }

        .box {
            background: rgba(255,255,255,0.1);
            padding: 30px;
            border-radius: 20px;
            width: 300px;
            margin: auto;
        }

        button {
            margin-top: 20px;
            padding: 10px 20px;
            border: none;
            border-radius: 10px;
            background: white;
            color: black;
            cursor: pointer;
        }
    </style>
</head>

<body>

    <div class="box">
        <h1>Second Branch 🚀</h1>
        <p>This is a better version of my project</p>

        <button onclick="changeText()">Click me</button>
        <p id="msg"></p>
    </div>

    <script>
        function changeText() {
            document.getElementById("msg").innerText = "You clicked the button! 🔥";
        }
    </script>

</body>
</html>
